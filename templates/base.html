<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🔥 TITLE -->
    <title>{% block title %}FF Store Pro | Buy Free Fire Accounts{% endblock %}</title>

    <!-- 🔥 SEO META -->
    <meta name="description" content="Buy premium Free Fire accounts with rare skins, elite pass, instant delivery. Trusted FF Store Pro.">
    <meta name="keywords" content="Free Fire account, buy FF account, FF ID for sale, elite pass account">
    <meta name="author" content="FF Store Pro">

    <!-- 🔥 GOOGLE VERIFICATION (if using meta method) -->
    <!-- Replace XXXX with your code -->
    <meta name="google-site-verification" content="XXXX" />

    <!-- 🔥 OPEN GRAPH (FOR INSTAGRAM / WHATSAPP SHARE) -->
    <meta property="og:title" content="FF Store Pro - Buy Free Fire Accounts">
    <meta property="og:description" content="Premium FF accounts with rare skins & instant delivery.">
    <meta property="og:image" content="https://ff-store.onrender.com/static/default.png">
    <meta property="og:url" content="https://ff-store.onrender.com">
    <meta property="og:type" content="website">

    <!-- 🔥 FAVICON -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <!-- 🔥 FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- 🔥 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css', v=asset_version) }}"> {% block extra_css %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %} {% block extra_js %}{% endblock %}
</body>

</html>
